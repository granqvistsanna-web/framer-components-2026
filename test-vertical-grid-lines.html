<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vertical Grid Lines Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }

        /* Grid lines container */
        .grid-background {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        /* Gradient masks for fade in/out */
        .gradient-mask-top {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to bottom, rgba(10,10,15,1) 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }

        .gradient-mask-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to top, rgba(10,10,15,1) 0%, transparent 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* Grid lines */
        .grid-lines {
            display: flex;
            justify-content: space-evenly;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .grid-line {
            width: 1px;
            height: 100%;
            background-color: rgba(255,255,255,0.06);
            position: relative;
        }

        /* Responsive line counts */
        @media (max-width: 1023px) {
            .grid-line:nth-child(n+5) {
                display: none;
            }
        }

        @media (max-width: 767px) {
            .grid-line:nth-child(n+3) {
                display: none;
            }
        }

        /* Traveling segment */
        .segment {
            position: absolute;
            left: 0;
            width: 1px;
            background-color: rgba(255,255,255,0.4);
            will-change: transform, opacity;
            opacity: 0;
        }

        @keyframes travel {
            0% {
                transform: translateY(-20px);
                opacity: 0;
            }
            5% {
                opacity: var(--segment-opacity, 0.4);
            }
            95% {
                opacity: var(--segment-opacity, 0.4);
            }
            100% {
                transform: translateY(calc(100vh + 20px));
                opacity: 0;
            }
        }

        @keyframes pulse {
            0%, 100% { opacity: var(--pulse-min, 0.3); }
            50% { opacity: var(--pulse-max, 0.5); }
        }

        .segment.animating {
            animation: travel var(--duration, 6s) linear forwards,
                       pulse calc(var(--duration, 6s) * 0.5) ease-in-out infinite alternate;
        }

        /* Content overlay */
        .content {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
            opacity: 0.9;
        }

        p {
            font-size: clamp(1rem, 2vw, 1.25rem);
            opacity: 0.6;
            max-width: 600px;
            text-align: center;
            line-height: 1.6;
        }

        .controls {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 0.75rem 1.5rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        button:hover {
            background: rgba(255,255,255,0.2);
        }

        .light-mode {
            background: #f5f5f7;
            color: #1a1a1a;
        }

        .light-mode .gradient-mask-top {
            background: linear-gradient(to bottom, rgba(245,245,247,1) 0%, transparent 100%);
        }

        .light-mode .gradient-mask-bottom {
            background: linear-gradient(to top, rgba(245,245,247,1) 0%, transparent 100%);
        }

        .light-mode .grid-line {
            background-color: rgba(0,0,0,0.06);
        }

        .light-mode .segment {
            background-color: rgba(0,0,0,0.4);
        }

        .light-mode button {
            background: rgba(0,0,0,0.1);
            border-color: rgba(0,0,0,0.2);
            color: #1a1a1a;
        }

        .light-mode button:hover {
            background: rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <div class="grid-background" id="gridBg">
        <div class="gradient-mask-top"></div>
        <div class="gradient-mask-bottom"></div>
        <div class="grid-lines" id="gridLines">
            <!-- Lines will be generated by JS -->
        </div>
    </div>

    <div class="content">
        <h1>Vertical Grid Lines</h1>
        <p>A subtle animated background with vertical grid lines and traveling segments. The effect is meant to be atmospheric and technical, supporting the design without drawing attention away from content.</p>
    </div>

    <div class="controls">
        <button onclick="toggleTheme()">Toggle Theme</button>
        <button onclick="toggleGradientMask()">Toggle Gradient Mask</button>
        <button onclick="toggleJitter()">Toggle Jitter</button>
        <button onclick="togglePulse()">Toggle Pulse</button>
    </div>

    <script>
        // Configuration
        const config = {
            lineCountDesktop: 6,
            lineCountTablet: 4,
            lineCountMobile: 2,
            segmentMinHeight: 4,
            segmentMaxHeight: 20,
            segmentMinOpacity: 0.3,
            segmentMaxOpacity: 0.6,
            minDuration: 4,
            maxDuration: 8,
            minDelay: 1,
            maxDelay: 6,
            enablePulse: true,
            enableJitter: true,
        };

        let activeSegments = new Map();

        // Get responsive line count
        function getLineCount() {
            const width = window.innerWidth;
            if (width < 480) return config.lineCountMobile;
            if (width < 768) return Math.max(config.lineCountMobile, config.lineCountTablet - 1);
            if (width < 1024) return config.lineCountTablet;
            return config.lineCountDesktop;
        }

        // Initialize grid lines
        function initGrid() {
            const container = document.getElementById('gridLines');
            container.innerHTML = '';
            activeSegments.clear();
            const lineCount = getLineCount();

            for (let i = 0; i < lineCount; i++) {
                const line = document.createElement('div');
                line.className = 'grid-line';
                line.dataset.index = i;
                container.appendChild(line);
                
                // Start segment spawning for this line
                scheduleNextSegment(i);
            }
        }

        // Create a traveling segment
        function createSegment(lineIndex) {
            const line = document.querySelector(`.grid-line[data-index="${lineIndex}"]`);
            if (!line) return;
            
            // Skip if already has an active segment
            if (activeSegments.has(lineIndex)) return;

            const height = config.segmentMinHeight + Math.random() * (config.segmentMaxHeight - config.segmentMinHeight);
            const opacity = config.segmentMinOpacity + Math.random() * (config.segmentMaxOpacity - config.segmentMinOpacity);
            const duration = config.minDuration + Math.random() * (config.maxDuration - config.minDuration);
            const jitter = config.enableJitter ? (Math.random() - 0.5) * 0.4 : 0;

            const segment = document.createElement('div');
            segment.className = 'segment';
            segment.style.height = `${height}px`;
            segment.style.left = config.enableJitter ? `${jitter}px` : '0';
            segment.style.setProperty('--segment-opacity', opacity);
            segment.style.setProperty('--duration', `${duration}s`);
            
            if (config.enablePulse) {
                segment.style.setProperty('--pulse-min', opacity * 0.7);
                segment.style.setProperty('--pulse-max', Math.min(opacity * 1.3, config.segmentMaxOpacity));
            } else {
                segment.style.setProperty('--pulse-min', opacity);
                segment.style.setProperty('--pulse-max', opacity);
            }
            
            // Set color based on theme
            if (document.body.classList.contains('light-mode')) {
                segment.style.backgroundColor = `rgba(0,0,0,${opacity})`;
            }

            line.appendChild(segment);
            activeSegments.set(lineIndex, segment);
            
            // Trigger animation
            requestAnimationFrame(() => {
                segment.classList.add('animating');
            });

            // Schedule removal and next segment
            setTimeout(() => {
                segment.remove();
                activeSegments.delete(lineIndex);
                scheduleNextSegment(lineIndex);
            }, duration * 1000);
        }

        // Schedule next segment for a line
        function scheduleNextSegment(lineIndex) {
            // Only allow one active segment per line
            if (activeSegments.has(lineIndex)) return;

            const delay = config.minDelay + Math.random() * (config.maxDelay - config.minDelay);
            setTimeout(() => createSegment(lineIndex), delay * 1000);
        }

        // Toggle theme
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }

        // Toggle gradient mask
        let gradientMaskEnabled = true;
        function toggleGradientMask() {
            gradientMaskEnabled = !gradientMaskEnabled;
            document.querySelector('.gradient-mask-top').style.display = gradientMaskEnabled ? 'block' : 'none';
            document.querySelector('.gradient-mask-bottom').style.display = gradientMaskEnabled ? 'block' : 'none';
        }

        // Toggle jitter
        function toggleJitter() {
            config.enableJitter = !config.enableJitter;
            initGrid(); // Restart to apply
        }

        // Toggle pulse
        function togglePulse() {
            config.enablePulse = !config.enablePulse;
            initGrid(); // Restart to apply
        }

        // Handle resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(initGrid, 250);
        });

        // Initialize when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initGrid);
        } else {
            initGrid();
        }
    </script>
</body>
</html>
